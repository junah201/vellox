[tox]
envlist = lint, py{38,39,310,311,312,313}-{flask2,flask3}

[testenv:lint]
skip_install = true
deps = ruff
commands =
    ruff check .
    ruff format --check .

[testenv:format]
skip_install = true
deps = ruff
commands =
    ruff format .

[testenv]
deps =
    pytest>=8.2.2
    pytest-cov>=5.0.0
    fastapi>=0.111.0
    starlette>=0.37.2
    flask2: flask>=2.2.5,<3.0.0
    flask3: flask>=3.0.0,<4.0.0
commands =
    pytest --cov=vellox --cov-fail-under=90 --cov-report=term-missing {posargs}
