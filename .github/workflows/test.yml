name: Test

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Install tox
        run: uv tool install tox --with tox-uv
      - name: Lint
        run: tox -e lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: "3.13"
            tox-env: "py313"
          - python-version: "3.12"
            tox-env: "py312"
          - python-version: "3.11"
            tox-env: "py311"
          - python-version: "3.10"
            tox-env: "py310"
          - python-version: "3.9"
            tox-env: "py39"
          - python-version: "3.8"
            tox-env: "py38"
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tox
        run: uv tool install tox --with tox-uv
      - name: Test
        run: tox -e ${{ matrix.tox-env }}
